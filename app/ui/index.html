<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Provenance Guard - Verification Portal</title>
    <style>
        :root {
            --bg-primary: #0f172a;
            --panel-bg: rgba(30, 41, 59, 0.7);
            --accent-blue: #38bdf8;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success: #4ade80;
            --warning: #fbbf24;
            --danger: #f87171;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: var(--bg-primary); color: var(--text-main); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        
        .container { 
            width: 100%; max-width: 650px; 
            background: var(--panel-bg); 
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 16px; padding: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        h1 { font-size: 1.5rem; margin-bottom: 8px; color: var(--accent-blue); display: flex; align-items: center; gap: 8px; }
        .subtitle { font-size: 0.875rem; color: var(--text-muted); margin-bottom: 24px; }
        
        label { display: block; font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; color: var(--text-muted); }
        textarea { width: 100%; height: 160px; background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px; padding: 12px; color: var(--text-main); font-size: 0.95rem; resize: none; margin-bottom: 20px; transition: border-color 0.2s; }
        textarea:focus { outline: none; border-color: var(--accent-blue); }

        button { width: 100%; background: var(--accent-blue); color: var(--bg-primary); border: none; padding: 12px; font-size: 1rem; font-weight: 600; border-radius: 8px; cursor: pointer; transition: opacity 0.2s; }
        button:hover { opacity: 0.9; }
        button:disabled { background: var(--text-muted); cursor: not-allowed; }

        .result-box { display: none; margin-top: 24px; padding: 20px; border-radius: 8px; border-left: 4px solid #fff; background: rgba(255,255,255,0.03); }
        .result-box.likely_human { border-color: var(--success); }
        .result-box.uncertain { border-color: var(--warning); }
        .result-box.likely_ai { border-color: var(--danger); }

        .result-title { font-weight: 700; font-size: 1.1rem; margin-bottom: 6px; }
        .result-box.likely_human .result-title { color: var(--success); }
        .result-box.uncertain .result-title { color: var(--warning); }
        .result-box.likely_ai .result-title { color: var(--danger); }

        .label-text { font-size: 0.95rem; line-height: 1.5; color: #e2e8f0; }
        .meta { font-size: 0.8rem; color: var(--text-muted); margin-top: 10px; }

        .appeal-section { display: none; margin-top: 20px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); }
        .appeal-section input { width: 100%; background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 6px; padding: 10px; color: var(--text-main); font-size: 0.9rem; margin-bottom: 12px; }
        .appeal-section input:focus { outline: none; border-color: var(--danger); }
        .appeal-btn { background: transparent; border: 1px solid var(--danger); color: var(--danger); }
        .appeal-btn:hover { background: var(--danger); color: var(--bg-primary); }
    </style>
</head>
<body>

<div class="container">
    <h1>Provenance Guard</h1>
    <div class="subtitle">AI Poetry Detection & Linguistic Verification System</div>

    <label for="poemInput">Submit Poetry Work</label>
    <textarea id="poemInput" placeholder="Paste or type poem lines here..."></textarea>
    
    <button id="validateBtn" onclick="validateText()">Validate Integrity</button>

    <div id="resultBox" class="result-box">
        <div id="resultTitle" class="result-title"></div>
        <div id="labelText" class="label-text"></div>
        <div id="resultMeta" class="meta"></div>

        <div id="appealSection" class="appeal-section">
            <label for="appealReasoning">Submit Verification Appeal</label>
            <input type="text" id="appealReasoning" placeholder="Provide context on why this work was flagged...">
            <button class="appeal-btn" id="appealBtn" onclick="submitAppeal()">File Dispute</button>
        </div>
    </div>
</div>

<script>
    const API_BASE = "http://127.0.0.1:8800";
    let currentContentId = null;

    async function validateText() {
        const text = document.getElementById("poemInput").value.strip ? 
                     document.getElementById("poemInput").value.trim() : 
                     document.getElementById("poemInput").value;
        const validateBtn = document.getElementById("validateBtn");
        const resultBox = document.getElementById("resultBox");
        const appealSection = document.getElementById("appealSection");

        if(!text) return alert("Please present structural poem content before execution.");

        validateBtn.disabled = true;
        validateBtn.innerText = "Analyzing Telemetry...";
        resultBox.style.display = "none";
        appealSection.style.display = "none";

        try {
            const response = await fetch(`${API_BASE}/submit`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ text: text, creator_id: "web-ui-session-1" })
            });
            
            const data = await response.get_json ? await response.get_json() : await response.json();
            if(!response.ok) throw new Error(data.error || "Verification tracking error");

            currentContentId = data.content_id;
            
            // Clean up class styling
            resultBox.className = `result-box ${data.attribution}`;
            document.getElementById("resultTitle").innerText = data.attribution.replace('_', ' ').toUpperCase();
            document.getElementById("labelText").innerText = data.transparency_label;
            document.getElementById("resultMeta").innerText = `System Confidence Score: ${data.confidence} | ID: ${data.content_id}`;
            resultBox.style.display = "block";

            // If flagged AI, reveal the appeal interaction component option
            if (data.offer_appeal) {
                appealSection.style.display = "block";
            }
        } catch (err) {
            alert(`Execution Defect: ${err.message}`);
        } finally {
            validateBtn.disabled = false;
            validateBtn.innerText = "Validate Integrity";
        }
    }

    async function submitAppeal() {
        const reasoning = document.getElementById("appealReasoning").value;
        const appealBtn = document.getElementById("appealBtn");

        if(!reasoning) return alert("Please specify an explicit verification reason for your appeal.");

        appealBtn.disabled = true;
        appealBtn.innerText = "Filing Dispute...";

        try {
            const response = await fetch(`${API_BASE}/appeal`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ content_id: currentContentId, creator_reasoning: reasoning })
            });

            const data = await response.get_json ? await response.get_json() : await response.json();
            if(!response.ok) throw new Error(data.error || "Appeal execution error");

            alert("Appeal logged into system repository. Status updated to: Under Review");
            document.getElementById("appealSection").innerHTML = `<div style="color: #4ade80; font-size: 0.9rem; font-weight: 600;">✓ Verification Under Review (Pending)</div>`;
            document.getElementById("resultTitle").innerText = "UNDER_REVIEW";
            document.getElementById("resultBox").className = "result-box uncertain";
        } catch (err) {
            alert(`Appeal Failure: ${err.message}`);
            appealBtn.disabled = false;
            appealBtn.innerText = "File Dispute";
        }
    }
</script>
</body>
</html>
